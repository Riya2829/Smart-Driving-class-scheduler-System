<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registered Students</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/view_students.css') }}">
</head>

<body>

    <div class="container">

        <h1>Registered Students</h1>

        <table>

            <tr>
                <th>Name</th>
                <th>Email</th>
            </tr>

            {% for student in students %}

            <tr>
                <td>{{ student[0] }}</td>
                <td>{{ student[1] }}</td>
            </tr>

            {% endfor %}

        </table>

        <a href="/admin_dashboard" class="back-btn">
            Back
        </a>

    </div>

</body>
</html>
